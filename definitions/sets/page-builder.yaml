name: page-builder
label: Page Builder
description: Drag-and-drop content builder for CMS, products and categories
packages:
  - mage-os/page-builder
  - mage-os/module-page-builder
  - mage-os/module-page-builder-image-attribute
  - mage-os/module-cms-page-builder-analytics
  - mage-os/module-catalog-page-builder-analytics
  - mage-os/module-page-builder-admin-analytics
  - mage-os/module-aws-s3-page-builder
  - mage-os/module-page-builder-template-import-export
  - mage-os/module-page-builder-widget
subtoggles:
  - name: analytics
    label: Page Builder analytics
    description: Usage analytics for Page Builder content types
    # Page Builder analytics builds on the core Analytics framework, so it can't
    # stand on its own — it's forced off when the Analytics set is removed.
    requires:
      set: analytics
    packages:
      - mage-os/module-cms-page-builder-analytics
      - mage-os/module-catalog-page-builder-analytics
      - mage-os/module-page-builder-admin-analytics
group: Marketing & Content
