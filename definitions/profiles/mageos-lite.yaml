name: mageos-lite
label: Mage-OS Lite
description: Aggressively trimmed Mage-OS — the Luma storefront on a bare core. Every removable module is stripped except the Luma theme and Two-Factor Authentication; English only, no GraphQL. The Web API layer stays (Luma needs it).
selection:
  # Disable every set except luma + two-factor-auth. Sets stock Mage-OS locks on
  # (hard cross-module deps) stay listed: it's a no-op on standard Mage-OS —
  # they're force-kept — but under the fully-modular (modulargento) distribution
  # they're genuinely stripped, making "Lite" as light as the build allows.
  disabledSets:
    - admin-analytics
    - admin-theme-m137
    - adobe-stock
    - analytics
    - automatic-translation
    - aws-s3
    - bundle
    - dhl
    - downloadable
    - fedex
    - gift-message
    - google-marketing
    - grouped
    - instant-purchase
    - inventory
    - login-as-customer
    - mageos-rma
    - marketplace
    - media-gallery
    - media-gallery-sync
    - msrp
    - multishipping
    - new-relic
    - newsletter
    - order-cancellation
    - page-builder
    - paypal
    - persistent-cart
    - product-alert
    - recaptcha
    - release-notification
    - reviews
    - rss
    - sample-data
    - send-friend
    - swagger
    - swatches
    - ups
    - usps
    - weee
    - wishlist
    # English only.
    - language-de_de
    - language-es_es
    - language-fr_fr
    - language-nl_nl
    - language-pt_br
    - language-zh_hans_cn
  disabledLayers:
    - graphql
  enabledLayers: []
  enabledAddons: []
  profileGroups:
    theme: luma
    checkout: default
