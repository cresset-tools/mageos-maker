name: mageos-lite
label: Mage-OS Lite
description: Aggressively trimmed Mage-OS — simple products only, no GraphQL, no message queue, English only
selection:
  disabledSets:
    - admin-analytics
    - admin-theme-m137
    - adobe-stock
    - automatic-translation
    - aws-s3
    - dhl
    - fedex
    - google-marketing
    - inventory
    - language-de_de
    - language-es_es
    - language-fr_fr
    - language-nl_nl
    - language-pt_br
    - language-zh_hans_cn
    - login-as-customer
    - marketplace
    - multishipping
    - new-relic
    - order-cancellation
    - page-builder
    - paypal
    - persistent-cart
    - recaptcha
    - rss
    - sample-data
    - send-friend
    - swagger
    - ups
    - usps
    - weee
    # Sets stock Mage-OS locks on (hard cross-module deps) but the fully-modular
    # (modulargento) distribution decouples. Listing them is a no-op on standard
    # Mage-OS — they're force-kept — but under modulargento they're stripped too,
    # so "Lite" becomes genuinely light: simple products only, no
    # wishlist/reviews/newsletter/gift-message/MSRP/swatches/bundle/downloadable.
    - bundle
    - downloadable
    - gift-message
    - grouped
    - instant-purchase
    - media-gallery-sync
    - msrp
    - newsletter
    - product-alert
    - release-notification
    - reviews
    - swatches
    - wishlist
  disabledLayers:
    - graphql
  enabledLayers: []
  enabledAddons: []
  profileGroups:
    theme: luma
    checkout: default
